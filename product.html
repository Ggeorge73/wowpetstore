<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View product details, reviews, and subscribe for automatic delivery at WowPetStore.">
  <title>Product | WowPetStore</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/pet-cursor.css">
</head>
<body>
  <div id="nav-slot"></div>

  <div class="page-body">
    <div class="container section" style="padding-top: var(--space-6);">
      <nav class="breadcrumbs" id="breadcrumbs"></nav>

      <!-- Product Detail -->
      <div class="product-detail" id="product-detail"></div>

      <!-- Tabs -->
      <div style="margin-top: var(--space-12);" id="product-tabs-section">
        <div class="tabs" id="product-tabs"></div>
        <div id="tab-contents"></div>
      </div>

      <!-- Frequently Bought Together -->
      <div id="fbt-container"></div>

      <!-- Related Products -->
      <section style="margin-top: var(--space-12);" id="related-section">
        <h3 class="section-title" style="text-align: left; margin-bottom: var(--space-6);">You May Also Like</h3>
        <div class="horizontal-scroll" id="related-products"></div>
      </section>
    </div>
  </div>

  <div id="footer-slot"></div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script src="js/animations.js"></script>
  <script src="https://sdks.shopifycdn.com/buy-button/latest/buy-button-storefront.min.js"></script>
  <script src="js/product.js"></script>
  <script>
    WowApp.init('shop');
    ProductPage.init();
  </script>
  <script src="js/pet-cursor.js"></script>
</body>
</html>
